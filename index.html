<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Homes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(0,0,0,0.6);
  position: fixed;
  width: 100%;
}
nav h2 {
  color: #38bdf8;
}
nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* Hero */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.hero div {
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 10px;
}
.hero h1 {
  font-size: 45px;
}
.hero button {
  margin-top: 20px;
  padding: 12px 25px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}

/* Properties */
.section {
  padding: 80px 20px;
  text-align: center;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}
.card {
  background: #1e293b;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}
.card:hover {
  transform: scale(1.05);
}
.card img {
  width: 100%;
}
.card h3 {
  padding: 10px;
}

/* Contact */
.contact input, .contact textarea {
  width: 60%;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 5px;
}
.contact button {
  padding: 10px 20px;
  background: #38bdf8;
  border: none;
}

/* Footer */
footer {
  background: #020617;
  padding: 20px;
  text-align: center;
}
</style>
</head>

<body>

<nav>
  <h2>Luxury Homes</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Properties</a>
    <a href="#">Contact</a>
  </div>
</nav>

<div class="hero">
  <div>
    <h1>Find Your Dream Home</h1>
    <p>Premium properties at best prices</p>
    <button>Explore</button>
  </div>
</div>

<div class="section">
  <h2>Featured Properties</h2>
  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <h3>Modern Apartment</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
      <h3>Luxury Villa</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
      <h3>Family House</h3>
    </div>
  </div>
</div>

<div class="section contact">
  <h2>Contact Us</h2>
  <input placeholder="Name"><br>
  <input placeholder="Email"><br>
  <textarea placeholder="Message"></textarea><br>
  <button>Send</button>
</div>

<footer>
  <p>© 2026 Luxury Homes</p>
</footer>

</body>
</html>
